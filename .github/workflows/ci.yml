name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (format, lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --ignore-scripts: CI doesn't run git hooks, so it doesn't need
      # lefthook's build (and this pnpm errors on unapproved build scripts).
      # Nothing runtime-critical is fetched via scripts — vite-plus ships
      # prebuilt bindings — so the checks and tests run fine.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Format + lint
        run: pnpm exec vp check

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm exec vp test

  rust:
    name: Rust (format, lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # Tauri v2 build prerequisites for Ubuntu — the tauri crate probes
      # these system libraries via pkg-config during `cargo check`.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            build-essential \
            curl wget file libssl-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Typecheck
        run: cargo check --all-targets

      # Keychain tests are #[ignore]-d (real OS keychain, local-only), so the
      # default run is CI-safe.
      - name: Test
        run: cargo test
